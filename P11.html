<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bootstrap Contact Form</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    .form-card { max-width: 900px; }
  </style>
</head>
<body class="bg-body-secondary">

  <main class="container py-5 d-flex justify-content-center">
    <section class="form-card w-100 p-4 bg-white shadow-sm rounded">
      <header class="mb-4 text-center">
        <h1 class="h3 mb-1">Get in touch</h1>
        <p class="text-muted mb-0">Fill out the form and we will get back to you within 2 business days.</p>
      </header>

      <form id="contactForm" novalidate>
        <div class="row g-3">
          <div class="col-12 col-md-6">
            <label for="name" class="form-label">Full name</label>
            <input type="text" class="form-control" id="name" name="name" placeholder="Full Name" required>
            <div class="invalid-feedback">Please enter your name.</div>
          </div>

          <div class="col-12 col-md-6">
            <label for="email" class="form-label">Email address</label>
            <input type="email" class="form-control" id="email" name="email" placeholder="you@example.com" required>
            <div class="invalid-feedback">Please provide a valid email.</div>
          </div>

          <div class="col-12 col-md-6">
            <label for="phone" class="form-label">Phone (optional)</label>
            <input type="tel" class="form-control" id="phone" name="phone" placeholder="(000) 000-5555">
          </div>

          <div class="col-12 col-md-6">
            <label for="subject" class="form-label">Subject</label>
            <select id="subject" name="subject" class="form-select" required>
              <option value="">Choose...</option>
              <option>General question</option>
              <option>Support</option>
              <option>Billing</option>
            </select>
            <div class="invalid-feedback">Please select a subject.</div>
          </div>

          <div class="col-12">
            <label for="message" class="form-label">Message</label>
            <textarea id="message" name="message" class="form-control" rows="6" placeholder="How can we help?" required></textarea>
            <div class="invalid-feedback">Please enter a message.</div>
          </div>

          <div class="col-12 d-flex flex-column flex-sm-row align-items-center justify-content-between gap-2">
            <div class="form-check">
              <input class="form-check-input" type="checkbox" value="yes" id="subscribe" name="subscribe">
              <label class="form-check-label" for="subscribe">Subscribe to updates</label>
            </div>

            <div class="text-muted small">All fields marked required must be filled.</div>
          </div>

          <div class="col-12 d-flex gap-2">
            <button type="submit" class="btn btn-primary">Send message</button>
            <button type="reset" class="btn btn-outline-secondary">Reset</button>
            <div id="status" role="status" aria-live="polite" class="ms-auto"></div>
          </div>
        </div>
      </form>

    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    (function () {
      'use strict'
      const form = document.getElementById('contactForm');
      const status = document.getElementById('status');

      form.addEventListener('submit', function (e) {
        e.preventDefault();
        e.stopPropagation();

        if (!form.checkValidity()) {
          form.classList.add('was-validated');
          status.innerHTML = '';
          return;
        }

        const submitBtn = form.querySelector('button[type="submit"]');
        submitBtn.disabled = true;
        submitBtn.innerHTML = 'Sending...';

        setTimeout(() => {
          submitBtn.disabled = false;
          submitBtn.innerHTML = 'Send message';
          form.reset();
          form.classList.remove('was-validated');

          status.innerHTML = '<div class="alert alert-success mb-0">Thanks — your message has been sent.</div>';
        }, 800);
      }, false);
    })();
  </script>
</body>
</html>
